services:
  postgres:
    image: postgres:16-alpine
    container_name: backend_platform_db
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_dev_password
      POSTGRES_DB: backend_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: